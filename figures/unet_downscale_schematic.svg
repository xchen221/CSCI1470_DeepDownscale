<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .title { font: 700 38px Arial, Helvetica, sans-serif; fill: #1f2933; }
      .subtitle { font: 400 20px Arial, Helvetica, sans-serif; fill: #52616b; }
      .section { font: 700 18px Arial, Helvetica, sans-serif; fill: #36454f; letter-spacing: .5px; }
      .block-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #17212b; }
      .block-text { font: 400 16px Arial, Helvetica, sans-serif; fill: #26323d; }
      .small { font: 400 14px Arial, Helvetica, sans-serif; fill: #52616b; }
      .shape { stroke: #23313d; stroke-width: 2.2; rx: 8; ry: 8; }
      .input { fill: #d9f0f4; }
      .enc { fill: #c8e6c9; }
      .bridge { fill: #f7d7a8; }
      .dec { fill: #d7d9f7; }
      .out { fill: #ffd6dc; }
      .note { fill: #ffffff; stroke: #7b8794; stroke-width: 1.6; rx: 8; ry: 8; }
      .arrow { stroke: #23313d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .downarrow { stroke: #23313d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .skip { stroke: #c2410c; stroke-width: 3; fill: none; stroke-dasharray: 9 7; marker-end: url(#arrow-orange); }
      .flow-label { font: 700 13px Arial, Helvetica, sans-serif; fill: #23313d; }
      .skip-label { font: 700 13px Arial, Helvetica, sans-serif; fill: #c2410c; }
      .legend { fill: #ffffff; stroke: #7b8794; stroke-width: 1.4; rx: 8; ry: 8; }
      .skip-tag { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.8; rx: 6; ry: 6; }
      .tag-text { font: 700 13px Arial, Helvetica, sans-serif; fill: #c2410c; }
      .concat-circle { fill: #ffffff; stroke: #c2410c; stroke-width: 2.2; }
      .concat-plus { font: 700 16px Arial, Helvetica, sans-serif; fill: #c2410c; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#23313d"/>
    </marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#c2410c"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>

  <text class="title" x="80" y="78">Model 1: CNN U-Net Downscaling Network</text>
  <text class="subtitle" x="80" y="113">Fully convolutional encoder-decoder with two skip connections.</text>
  <text class="subtitle" x="80" y="140">Each DoubleConv is Conv 3x3 + ReLU repeated twice.</text>

  <text class="section" x="220" y="175">INPUT</text>
  <text class="section" x="455" y="175">ENCODER</text>
  <text class="section" x="1110" y="175">DECODER</text>
  <text class="section" x="1385" y="175">OUTPUT</text>

  <rect class="shape input" x="90" y="220" width="210" height="130"/>
  <text class="block-title" x="125" y="260">Input tensor</text>
  <text class="block-text" x="125" y="292">variable feature inputs</text>
  <text class="small" x="125" y="319">e.g., Tmax, elevation, urban</text>
  <text class="small" x="125" y="344">B x C_in x H x W</text>

  <rect class="shape enc" x="390" y="220" width="230" height="130"/>
  <text class="block-title" x="425" y="260">DoubleConv</text>
  <text class="block-text" x="425" y="292">feature extraction</text>
  <text class="small" x="425" y="319">preserves H x W</text>

  <rect class="shape enc" x="690" y="220" width="230" height="130"/>
  <text class="block-title" x="725" y="260">MaxPool +</text>
  <text class="block-title" x="725" y="286">DoubleConv</text>
  <text class="block-text" x="725" y="318">downsample features</text>
  <text class="small" x="725" y="344">H/2 x W/2</text>

  <rect class="shape bridge" x="690" y="475" width="230" height="130"/>
  <text class="block-title" x="725" y="515">MaxPool +</text>
  <text class="block-title" x="725" y="541">DoubleConv</text>
  <text class="block-text" x="725" y="573">deeper features</text>
  <text class="small" x="725" y="599">H/4 x W/4</text>

  <rect class="shape dec" x="990" y="475" width="230" height="130"/>
  <text class="block-title" x="1025" y="515">UpConv + concat</text>
  <text class="block-text" x="1025" y="547">upsample features</text>
  <text class="small" x="1025" y="574">skip from matching encoder layer</text>
  <text class="small" x="1025" y="599">H/2 x W/2</text>

  <rect class="shape dec" x="990" y="220" width="230" height="130"/>
  <text class="block-title" x="1025" y="260">UpConv + concat</text>
  <text class="block-text" x="1025" y="292">refine full-resolution features</text>
  <text class="small" x="1025" y="319">skip from matching encoder layer</text>
  <text class="small" x="1025" y="344">H x W</text>

  <rect class="shape out" x="1310" y="220" width="210" height="130"/>
  <text class="block-title" x="1345" y="260">1x1 Conv</text>
  <text class="block-text" x="1345" y="292">predict target field</text>
  <text class="small" x="1345" y="319">Downscaled Tmax</text>
  <text class="small" x="1345" y="344">B x C_out x H x W</text>

  <rect class="legend" x="1140" y="82" width="380" height="78"/>
  <path class="arrow" d="M 1170 112 L 1235 112"/>
  <text class="small" x="1250" y="117">main tensor flow</text>
  <rect class="skip-tag" x="1170" y="128" width="65" height="24"/>
  <text class="tag-text" x="1180" y="145">skip A</text>
  <text class="small" x="1250" y="145">copied to matching decoder concat</text>

  <path class="arrow" d="M 300 285 L 382 285"/>
  <path class="arrow" d="M 620 285 L 682 285"/>
  <path class="downarrow" d="M 805 350 L 805 465"/>
  <text class="flow-label" x="825" y="414">downsample</text>
  <path class="arrow" d="M 920 540 L 982 540"/>
  <path class="downarrow" d="M 1105 475 L 1105 360"/>
  <text class="flow-label" x="1125" y="420">upsample</text>
  <path class="arrow" d="M 1220 285 L 1302 285"/>

  <rect class="skip-tag" x="548" y="186" width="65" height="24"/>
  <text class="tag-text" x="558" y="203">skip A</text>
  <circle class="concat-circle" cx="980" cy="285" r="15"/>
  <text class="concat-plus" x="970" y="292">+A</text>
  <rect class="skip-tag" x="842" y="363" width="65" height="24"/>
  <text class="tag-text" x="852" y="380">skip B</text>
  <circle class="concat-circle" cx="980" cy="540" r="15"/>
  <text class="concat-plus" x="970" y="547">+B</text>

  <rect class="note" x="90" y="720" width="1430" height="115"/>
  <text class="block-title" x="125" y="758">Poster note</text>
  <text class="block-text" x="125" y="790">Model keeps the target grid size through padding after each transpose convolution.</text>
  <text class="block-text" x="125" y="814">Encoder features are concatenated with decoder features through skip connections.</text>
</svg>
