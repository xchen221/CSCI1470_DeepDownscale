<svg xmlns="http://www.w3.org/2000/svg" width="1780" height="640" viewBox="60 170 1780 640">
  <defs>
    <style>
  .bg{fill:transparent}
  .title{font:700 48px Arial,Helvetica,sans-serif;fill:#17212b}
  .subtitle{font:400 25px Arial,Helvetica,sans-serif;fill:#4b5b66}
  .section{font:700 25px Arial,Helvetica,sans-serif;fill:#33424e;letter-spacing:.8px}
  .block-title{font:700 25px Arial,Helvetica,sans-serif;fill:#17212b}
  .block-main{font:400 22px Arial,Helvetica,sans-serif;fill:#17212b}
  .block-sub{font:400 19px Arial,Helvetica,sans-serif;fill:#4b5b66}
  .note{font:400 20px Arial,Helvetica,sans-serif;fill:#4b5b66}
  .shape{stroke:#17212b;stroke-width:2.5;rx:9;ry:9}
  .input{fill:#ddf3f7}.enc{fill:#cdebce}.bridge{fill:#f9ddaa}.bot{fill:#f4c7da}.dec{fill:#d7dafa}.out{fill:#ffd5de}
  .arrow{stroke:#17212b;stroke-width:3;fill:none;marker-end:url(#arrow)}
  .flow-label{font:700 20px Arial,Helvetica,sans-serif;fill:#17212b}
  .skip-tag{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:6;ry:6}
  .skip-text{font:700 17px Arial,Helvetica,sans-serif;fill:#c2410c}
  .concat{fill:#fff;stroke:#c2410c;stroke-width:2.2}
  .concat-text{font:700 18px Arial,Helvetica,sans-serif;fill:#c2410c}
  .legend{fill:#fff;stroke:#9aa6b2;stroke-width:1.5;rx:8;ry:8}
</style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#17212b"/>
    </marker>
  </defs>
  <rect x="60" y="170" width="1780" height="640" fill="#ffffff"/>
  <text class="title" x="80" y="78">Model 1: CNN U-Net Downscaling Network</text>
  <text class="subtitle" x="80" y="118">Two encoder downsamples, two decoder upsamples, and two skip concatenations.</text>
  <rect class="legend" x="1320" y="48" width="395" height="86"/>
  <path class="arrow" d="M 1348 80 L 1425 80"/>
  <text class="block-sub" x="1445" y="87">main tensor flow</text>
  <rect class="skip-tag" x="1348" y="97" width="92" height="34"/>
  <text class="skip-text" x="1360" y="121">skip A</text>
  <text class="block-sub" x="1445" y="118">copied to matching concat</text>
  <line x1="80" y1="150" x2="1720" y2="150" stroke="#d0d7de" stroke-width="1.5"/>

  <text class="section" x="200" y="200">INPUT</text>
  <text class="section" x="535" y="200">ENCODER</text>
  <text class="section" x="1245" y="200">DECODER</text>
  <text class="section" x="1580" y="200">OUTPUT</text>

  <rect class="shape input" x="95" y="255" width="245" height="145"/>
  <text class="block-title" x="123" y="294">Input tensor</text>
  <text class="block-main" x="123" y="339">Variable feature inputs</text>
  <text class="block-sub" x="123" y="369">B x C_in x H x W</text>
  <rect class="shape enc" x="430" y="255" width="270" height="145"/>
  <text class="block-title" x="458" y="294">DoubleConv</text>
  <text class="block-main" x="458" y="339">Feature extraction</text>
  <text class="block-sub" x="458" y="369">H x W</text>
  <rect class="shape enc" x="785" y="255" width="285" height="165"/>
  <text class="block-title" x="813" y="294">MaxPool +</text>
  <text class="block-title" x="813" y="323">DoubleConv</text>
  <text class="block-main" x="813" y="355">Downsample features</text>
  <text class="block-sub" x="813" y="385">H/2 x W/2</text>
  <rect class="shape bridge" x="785" y="575" width="285" height="165"/>
  <text class="block-title" x="813" y="614">MaxPool +</text>
  <text class="block-title" x="813" y="643">DoubleConv</text>
  <text class="block-main" x="813" y="675">Deepest CNN features</text>
  <text class="block-sub" x="813" y="705">H/4 x W/4</text>
  <rect class="shape dec" x="1165" y="575" width="295" height="145"/>
  <text class="block-title" x="1193" y="614">UpConv +</text>
  <text class="block-title" x="1193" y="643">concat</text>
  <text class="block-main" x="1193" y="675">Upsample with skip B</text>
  <text class="block-sub" x="1193" y="705">H/2 x W/2</text>
  <rect class="shape dec" x="1165" y="255" width="295" height="145"/>
  <text class="block-title" x="1193" y="294">UpConv +</text>
  <text class="block-title" x="1193" y="323">concat</text>
  <text class="block-main" x="1193" y="355">Upsample with skip A</text>
  <text class="block-sub" x="1193" y="385">H x W</text>
  <rect class="shape out" x="1560" y="255" width="240" height="145"/>
  <text class="block-title" x="1588" y="294">1x1 Conv</text>
  <text class="block-main" x="1588" y="339">Predict target field</text>
  <text class="block-sub" x="1588" y="369">B x C_out x H x W</text>

  <path class="arrow" d="M 340 327 L 424 327"/>
  <path class="arrow" d="M 700 327 L 779 327"/>
  <path class="arrow" d="M 927 420 L 927 568"/>
  <text class="flow-label" x="954" y="492">downsample</text>
  <path class="arrow" d="M 1070 657 L 1158 657"/>
  <path class="arrow" d="M 1312 575 L 1312 410"/>
  <text class="flow-label" x="1340" y="492">upsample</text>
  <path class="arrow" d="M 1460 327 L 1553 327"/>

  <rect class="skip-tag" x="610" y="214" width="92" height="34"/>
  <text class="skip-text" x="622" y="238">skip A</text>
  <circle class="concat" cx="1152" cy="327" r="18"/>
  <text class="concat-text" x="1140" y="333">+A</text>
  <rect class="skip-tag" x="965" y="214" width="92" height="34"/>
  <text class="skip-text" x="977" y="238">skip B</text>
  <circle class="concat" cx="1152" cy="657" r="18"/>
  <text class="concat-text" x="1140" y="663">+B</text>

  <text class="note" x="95" y="865">Correctness check: decoder first concatenates the H/2 encoder feature, then the H encoder feature, matching model_cnn.py.</text>
  </svg>